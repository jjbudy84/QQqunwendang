<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QQ UI Restore</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden; background: #fff; color: #111;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
    }
    body {
      display: grid;
      place-items: center;
    }
    .qq-window {
      width: 1173px; height: 963px; overflow: hidden; position: relative;
      background: #f7f7f7; border: 2px solid #d0d0d0; border-radius: 10px;
      transform: scale(var(--app-scale, 1));
      transform-origin: center;
    }
    .topbar {
      height: 58px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px 0 16px; background: #e1e1e1;
    }
    .top-left, .top-mid, .top-right, .id, .qq-logo, .weather, .win { display: flex; align-items: center; }
    .top-left { min-width: 410px; gap: 18px; }
    .qq-logo { gap: 2px; font-size: 18px; font-weight: 700; }
    .id { gap: 8px; }
    .mini-avatar {
      width: 38px; height: 38px; position: relative; display: grid; place-items: center;
      border-radius: 50%; background: #fbfbfb;
    }
    .online {
      width: 11px; height: 11px; position: absolute; right: 0; bottom: 1px;
      border-radius: 50%; background: #29d36e; border: 2px solid #e1e1e1;
    }
    .name { font-size: 20px; font-weight: 700; }
    .sign { color: #888; font-size: 16px; margin-left: 2px; }
    .top-mid { position: absolute; left: 50%; transform: translateX(-50%); color: #696969; font-size: 20px; }
    .weather { gap: 10px; }
    .top-right { gap: 20px; }
    .win { gap: 31px; margin-left: 19px; }
    .main { height: calc(100% - 58px); display: flex; }
    .rail {
      width: 82px; flex: 0 0 82px; position: relative;
      border-right: 1px solid #e7e7e7; background: #f7f7f7;
    }
    .nav-top, .nav-bottom {
      width: 100%; position: absolute; left: 0; display: flex; flex-direction: column; align-items: center;
    }
    .nav-top { top: 24px; gap: 18px; }
    .nav-bottom { bottom: 25px; gap: 23px; }
    .nav {
      width: 36px; height: 36px; display: grid; place-items: center; color: #050505; position: relative;
      cursor: pointer;
    }
    .nav.active { color: #fff; }
    .nav.active::before {
      content: ""; width: 27px; height: 27px; position: absolute; border-radius: 50%; background: #1296f6;
    }
    .nav svg { position: relative; z-index: 1; }
    .sessions {
      width: 377px; flex: 0 0 377px; background: #f7f7f7; border-right: 1px solid #e7e7e7;
    }
    .search-row { height: 82px; display: flex; align-items: center; gap: 12px; padding: 19px 18px 13px; }
    .search {
      width: 289px; height: 41px; display: flex; align-items: center; padding: 0 14px;
      border-radius: 11px; background: #eee; color: #7f7f7f; font-size: 20px;
    }
    .search span { margin-left: 6px; }
    .plus {
      width: 40px; height: 40px; display: grid; place-items: center; border-radius: 12px;
      background: #eee; color: #8b8b8b; font-size: 32px; font-weight: 200; line-height: 1;
    }
    .session-list { padding: 0 4px; }
    .session {
      height: 90px; display: flex; align-items: center; position: relative; padding: 0 15px;
      border-radius: 8px; background: #e3e3e3;
    }
    .group-avatar {
      width: 59px; height: 59px; flex: 0 0 59px; margin-right: 18px; border-radius: 50%;
      background: #fff; display: grid; place-items: center; overflow: hidden;
    }
    .session-title { max-width: 190px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 20px; font-weight: 500; }
    .time { position: absolute; top: 22px; right: 15px; color: #989898; font-size: 16px; }
    .chat { flex: 1; min-width: 0; display: flex; flex-direction: column; background: #f7f7f7; position: relative; }
    .chat-head {
      height: 76px; flex: 0 0 76px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 27px; border-bottom: 1px solid #eee; background: #f7f7f7;
    }
    h1 { font-size: 26px; font-weight: 800; letter-spacing: 0; }
    .actions { display: flex; align-items: center; gap: 23px; color: #000; }
    .icon-btn, .tool { width: 28px; height: 28px; display: grid; place-items: center; }
    .icon-btn { border-radius: 11px; cursor: pointer; }
    .tool, .combo, .plus, .session { cursor: pointer; }
    .nav:hover, .tool:hover, .combo:hover, .icon-btn:hover, .plus:hover {
      color: #1296f6;
    }
    .icon-btn.active { width: 58px; height: 48px; margin: -10px -15px; background: #eeeeee; }
    .apps-menu {
      width: 141px; padding: 8px 0; position: absolute; top: 66px; right: 86px; z-index: 20;
      display: none; border-radius: 10px; background: #fff; box-shadow: 0 16px 34px rgba(0,0,0,.13);
    }
    .apps-menu.open { display: block; }
    .menu-item {
      height: 42px; display: flex; align-items: center; gap: 13px; padding: 0 19px;
      color: #111; font-size: 20px; line-height: 42px; cursor: pointer; white-space: nowrap;
    }
    .menu-item:hover { background: #f4f4f4; }
    .chat-body { flex: 1; position: relative; background: #f7f7f7; }
    .messages { position: absolute; inset: 0 0 310px 0; padding: 28px; overflow-y: auto; }
    .message-row { display: flex; margin-bottom: 16px; }
    .message-row.user { justify-content: flex-end; }
    .bubble {
      max-width: 70%; padding: 12px 15px; border-radius: 8px; background: #fff;
      font-size: 16px; line-height: 1.55; white-space: pre-wrap; word-break: break-word;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .message-row.user .bubble { background: #d9f1ff; }
    .split { position: absolute; left: 0; right: 0; bottom: 310px; height: 1px; background: #eee; }
    .toolbar {
      position: absolute; left: 34px; right: 34px; bottom: 255px; height: 48px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .tools-left { display: flex; align-items: center; gap: 23px; }
    .combo { display: flex; align-items: center; gap: 0; cursor: pointer; }
    textarea {
      position: absolute; left: 34px; right: 34px; bottom: 75px; height: 164px;
      resize: none; border: 0; outline: 0; background: transparent; color: #111;
      font: 18px/1.55 "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
    }
    textarea::placeholder { color: transparent; }
    .mention-panel {
      width: 390px; min-height: 80px; position: absolute; left: 34px; bottom: 245px; z-index: 12;
      display: none; padding: 8px; border-radius: 10px; background: #fff;
      box-shadow: 0 8px 24px rgba(0,0,0,.16);
    }
    .mention-panel.open { display: block; }
    .mention-option {
      height: 56px; display: flex; align-items: center; gap: 14px; padding: 0 14px;
      border-radius: 7px; cursor: pointer; font-size: 20px; color: #111;
    }
    .mention-option:hover, .mention-option.active { background: #f1f1f1; }
    .mention-avatar {
      width: 34px; height: 34px; flex: 0 0 34px; border-radius: 50%; object-fit: cover;
      background: #f5f5f5;
    }
    .hidden-file-input, .file-status { display: none; }
    .send-wrap { position: absolute; right: 34px; bottom: 22px; }
    .send {
      width: 141px; height: 48px; display: flex; align-items: center; justify-content: center;
      overflow: hidden; border-radius: 15px; background: #0a9bff; color: rgba(255,255,255,.55);
      cursor: pointer; user-select: none; font-size: 20px; font-weight: 500;
    }
    .send span { width: 88px; text-align: center; }
    .send i { font-style: normal; }
    .divider { width: 1px; height: 24px; background: rgba(255,255,255,.35); }
    .send-arrow { width: 52px; display: grid; place-items: center; }
    .icon { display: block; fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; }
    .fill { fill: currentColor; stroke: none; }
    .s16 { stroke-width: 1.6; } .s18 { stroke-width: 1.8; } .s20 { stroke-width: 2; } .s22 { stroke-width: 2.2; }
    .file-page {
      width: 100%; height: 100%; display: none; position: absolute; inset: 0; z-index: 30;
      background: #f7f7f7; color: #0f0f0f;
    }
    .qq-window.file-mode .topbar, .qq-window.file-mode .main { display: none; }
    .qq-window.file-mode .file-page { display: block; }
    .file-titlebar { height: 72px; position: relative; border-bottom: 1px solid #ededed; background: #f5f5f5; }
    .file-search {
      width: 516px; height: 42px; position: absolute; top: 13px; left: 330px; display: flex; align-items: center;
      gap: 8px; padding: 0 14px; border-radius: 11px; background: #ececec; color: #6f7884; font-size: 20px;
    }
    .file-window-controls { position: absolute; top: 13px; right: 15px; display: flex; align-items: center; gap: 30px; }
    .file-content { height: calc(100% - 72px); position: relative; padding: 28px 28px 0; }
    .file-top-row { height: 40px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .back-btn {
      width: 170px; height: 47px; display: flex; align-items: center; gap: 7px; padding: 0 18px 0 19px;
      border: 1px solid #d0d0d0; border-radius: 15px; background: #fff; color: #070707; font-size: 20px; cursor: pointer;
    }
    .crumb { margin-top: 4px; color: #777; font-size: 20px; }
    .doc-card {
      height: 98px; display: flex; align-items: center; padding: 0 30px 0 27px; margin-bottom: 24px;
      border-radius: 11px; background: #fff;
    }
    .folder-online { width: 52px; height: 44px; position: relative; flex: 0 0 auto; margin-right: 12px; border-radius: 3px; background: #16b9e9; }
    .folder-online::before {
      content: ""; width: 28px; height: 8px; position: absolute; top: -1px; left: 0;
      border-radius: 3px 4px 0 0; background: #16b9e9; transform: skewX(26deg); transform-origin: left bottom;
    }
    .doc-copy { flex: 1; min-width: 0; }
    .doc-title { margin-bottom: 2px; font-size: 21px; line-height: 28px; font-weight: 400; }
    .doc-sub { font-size: 18px; line-height: 24px; color: #6d7280; }
    .list-card { min-height: 187px; max-height: 528px; overflow: hidden; border-radius: 8px 8px 0 0; background: #fff; }
    .list-head { height: 66px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: 1px solid #eee; }
    .section-label { color: #5c6472; font-size: 19px; font-weight: 400; }
    .sort-btn {
      width: 156px; height: 37px; display: flex; align-items: center; justify-content: center; gap: 10px;
      border: 1px solid #e6e6e6; border-radius: 7px; color: #000; background: #fff; font-size: 17px; font-weight: 600;
    }
    .file-list { max-height: 462px; overflow-y: auto; background: #fff; }
    .folder-row, .file-row { height: 121px; display: grid; grid-template-columns: 36px 80px 1fr 238px; padding: 0 24px; background: #fff; border-bottom: 1px solid #f0f0f0; }
    .folder-row { cursor: pointer; }
    .folder-row:hover, .file-row:hover { background: #fafafa; }
    .folder-icon { width: 60px; height: 41px; position: relative; margin-top: 31px; border-radius: 4px; background: #5ab0f6; }
    .folder-icon::before { content: ""; width: 28px; height: 10px; position: absolute; top: -9px; left: 0; border-radius: 6px 6px 0 0; background: #65b7fb; }
    .folder-icon::after { content: ""; width: 55px; height: 8px; position: absolute; top: -3px; left: 5px; border-radius: 4px 4px 0 0; background: #65b7fb; }
    .folder-copy { margin-top: 20px; }
    .folder-name { margin-bottom: 6px; font-size: 21px; line-height: 26px; font-weight: 400; }
    .folder-count { color: #72727a; font-size: 18px; line-height: 22px; }
    .folder-meta { padding-top: 14px; color: #7d645f; text-align: right; font-size: 18px; line-height: 30px; }
    .folder-meta .updater { color: #77707b; font-size: 16px; }
    .file-icon {
      width: 48px; height: 56px; margin-top: 27px; border-radius: 6px; position: relative;
      background: #ffffff; border: 2px solid #70a9e9;
    }
    .file-icon::before {
      content: ""; position: absolute; right: -2px; top: -2px; width: 16px; height: 16px;
      background: linear-gradient(135deg, #dceeff 50%, #70a9e9 51%); border-radius: 0 4px 0 4px;
    }
    .file-type { position: absolute; left: 6px; bottom: 7px; color: #2c7dd2; font-size: 13px; font-weight: 700; }
    .file-name { margin-bottom: 6px; font-size: 21px; line-height: 26px; font-weight: 400; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-size { color: #72727a; font-size: 18px; line-height: 22px; }
    .file-meta { padding-top: 14px; color: #777; text-align: right; font-size: 16px; line-height: 28px; }
    .row-select { width: 18px; height: 18px; align-self: center; justify-self: start; accent-color: #1095ee; }
    .row-actions { display: flex; align-items: center; justify-content: flex-end; gap: 7px; margin-top: 6px; }
    .mini-btn, .move-btn {
      min-width: 54px; height: 30px; margin-top: 8px; border: 1px solid #e2e2e2; border-radius: 7px;
      background: #fff; color: #111; font-size: 15px; cursor: pointer;
    }
    .mini-btn:hover, .move-btn:hover { background: #f1f7ff; border-color: #b9daf8; }
    .mini-btn.danger:hover { background: #fff3f3; border-color: #f2b6b6; color: #c02d2d; }
    .path-label { max-width: 620px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .empty-tip { height: 132px; display: grid; place-items: center; color: #909090; font-size: 18px; background: #fff; }
    .file-empty { height: 328px; background: #f7f7f7; }
    .file-footer {
      height: 100px; position: absolute; left: 0; right: 0; bottom: 0; display: flex; align-items: center;
      justify-content: space-between; padding: 0 27px 0 29px; border-top: 1px solid #e8e8e8; background: #fff;
    }
    .quota { display: flex; align-items: center; gap: 34px; color: #7d7d7d; font-size: 22px; white-space: nowrap; }
    .usage { position: relative; min-width: 250px; }
    .usage::before { content: ""; width: 300px; height: 5px; position: absolute; left: -170px; top: -18px; border-radius: 4px; background: #dadada; }
    .file-actions { display: flex; align-items: center; gap: 8px; }
    .round-action { width: 31px; height: 31px; display: grid; place-items: center; color: #929292; }
    .upload-btn, .new-folder-btn { width: 119px; height: 49px; display: grid; place-items: center; border: 0; border-radius: 14px; background: #1095ee; color: #fff; font-size: 22px; cursor: pointer; }
    .new-folder-btn { width: 124px; background: #ffffff; color: #111; border: 1px solid #d9d9d9; font-size: 19px; }
    .batch-btn {
      height: 40px; min-width: 70px; padding: 0 12px; border: 1px solid #d9d9d9; border-radius: 11px;
      background: #fff; color: #111; font-size: 16px; cursor: pointer;
    }
    .batch-btn:disabled { color: #aaa; background: #f5f5f5; cursor: default; }
    .batch-btn.danger:not(:disabled) { color: #c02d2d; border-color: #efc0c0; }

    @media (max-width: 720px) {
      html, body { overflow: hidden; }
      body { display: block; }
      .qq-window {
        width: 100vw; height: 100dvh; border: 0; border-radius: 0;
        transform: none !important; transform-origin: top left;
      }
      .topbar, .sessions, .rail, .actions .icon-btn:not(#groupAppsBtn) { display: none; }
      .main { height: 100%; }
      .chat { width: 100%; flex: 1 1 auto; }
      .chat-head { height: 64px; flex-basis: 64px; padding: 0 16px; }
      h1 { font-size: 20px; }
      .actions { gap: 12px; }
      .apps-menu { top: 56px; right: 12px; }
      .messages { inset: 0 0 250px 0; padding: 16px; }
      .bubble { max-width: 86%; font-size: 15px; }
      .split { bottom: 250px; }
      .toolbar { left: 16px; right: 16px; bottom: 200px; height: 44px; }
      .tools-left { gap: 14px; }
      textarea { left: 16px; right: 16px; bottom: 64px; height: 128px; font-size: 16px; }
      .send-wrap { right: 16px; bottom: 14px; }
      .send { width: 112px; height: 42px; border-radius: 12px; font-size: 17px; }
      .send span { width: 70px; }
      .send-arrow { width: 42px; }
      .mention-panel { left: 16px; right: 16px; bottom: 192px; width: auto; }
      .file-titlebar { height: 58px; }
      .file-search { display: none; }
      .file-window-controls { top: 12px; right: 14px; gap: 16px; }
      .file-content { height: calc(100% - 58px); padding: 16px 14px 0; }
      .file-top-row { height: auto; gap: 10px; margin-bottom: 14px; }
      .back-btn { width: 96px; height: 40px; border-radius: 12px; font-size: 16px; }
      .crumb { font-size: 16px; }
      .doc-card { height: auto; min-height: 76px; padding: 12px 14px; margin-bottom: 14px; border-radius: 8px; }
      .doc-title { font-size: 17px; line-height: 24px; }
      .doc-sub { font-size: 14px; line-height: 20px; }
      .list-card { max-height: calc(100dvh - 260px); }
      .list-head { height: 52px; padding: 0 12px; }
      .section-label, .folder-name { font-size: 16px; }
      .sort-btn { width: auto; min-width: 108px; height: 34px; font-size: 14px; }
      .folder-row, .file-row {
        height: 92px; grid-template-columns: 28px 58px minmax(0, 1fr);
        padding: 0 12px;
      }
      .folder-meta, .file-meta { display: none; }
      .folder-icon { width: 44px; height: 31px; margin-top: 27px; }
      .folder-icon::before { width: 21px; height: 8px; top: -7px; }
      .folder-icon::after { width: 40px; height: 7px; top: -3px; left: 4px; }
      .file-icon { width: 40px; height: 48px; margin-top: 22px; }
      .folder-copy { margin-top: 16px; }
      .folder-count, .file-size { font-size: 14px; }
      .file-footer { height: 78px; padding: 0 14px; }
      .quota { gap: 10px; font-size: 14px; }
      .usage { min-width: 0; }
      .usage::before { display: none; }
      .upload-btn, .new-folder-btn { width: 86px; height: 42px; border-radius: 12px; font-size: 16px; }
      .new-folder-btn { width: 92px; }
    }
  </style>
</head>
<body>
  <div class="qq-window">
    <header class="topbar">
      <div class="top-left">
        <div class="qq-logo">
          <svg width="17" height="21" viewBox="0 0 20 24" aria-hidden="true"><path fill="#000" d="M10 1.5c-3.6 0-6.2 3-6.2 7.1 0 1.2.2 2.5.7 3.7-1 1.3-1.9 3-2.1 4.5-.1.7.5 1.2 1.2 1 .7-.2 1.5-.5 2.1-.8.8 1.1 1.7 2 2.8 2.4-.8.5-2.2 1.4-2.2 2.1 0 .5.8.8 1.9.5.8-.2 1.4-.7 1.8-1.1.4.4 1 .9 1.8 1.1 1.1.3 1.9 0 1.9-.5 0-.7-1.4-1.6-2.2-2.1 1.1-.4 2-1.3 2.8-2.4.6.3 1.4.6 2.1.8.7.2 1.3-.3 1.2-1-.2-1.5-1.1-3.2-2.1-4.5.5-1.2.7-2.5.7-3.7 0-4.1-2.6-7.1-6.2-7.1Z"/></svg>
          <span>QQ</span>
        </div>
        <div class="id">
          <div class="mini-avatar">
            <svg width="29" height="31" viewBox="0 0 58 62" aria-hidden="true"><path d="M17 17c.8-5.7 3.8-9 7.6-9 2.2 0 4.3 1.2 5.7 3.1C31.8 9.2 34 8 36.3 8c4 0 7.1 3.7 7.6 9.7 4.3 2.3 7.1 7.3 7.1 13.2 0 9.2-7 17.3-20.9 17.3S8.7 40.1 8.7 30.9c0-6.2 3.1-11.4 8.3-13.9Z" fill="#fff" stroke="#888" stroke-width="1.4"/><path d="M22 28h.1M37 28h.1M25 36c3 2.2 7.4 2.2 10.4 0" stroke="#888" stroke-width="1.4" stroke-linecap="round"/></svg>
            <b class="online"></b>
          </div>
          <strong class="name">静sir</strong>
          <span class="sign">编辑个性签名</span>
        </div>
      </div>
      <div class="top-mid">
        <div class="weather">
          <svg class="icon s18" width="39" height="39" viewBox="0 0 40 40" aria-hidden="true"><circle cx="20" cy="20" r="8" stroke="#848484"/><path d="M20 2.5v6M20 31.5v6M7.5 7.5l4.2 4.2M28.3 28.3l4.2 4.2M2.5 20h6M31.5 20h6M7.5 32.5l4.2-4.2M28.3 11.7l4.2-4.2" stroke="#848484"/></svg>
          <span>晴</span>
        </div>
      </div>
      <div class="top-right">
        <svg class="icon s18" width="21" height="21" viewBox="0 0 24 24"><rect x="3.5" y="4" width="17" height="16" rx="3"/><path d="M11 8l-4 4 4 4M7.5 12h12"/></svg>
        <div class="win"><svg class="icon s18" width="17" height="17" viewBox="0 0 24 24"><path d="M5 12h14"/></svg><svg class="icon s18" width="18" height="18" viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14"/></svg><svg class="icon s18" width="18" height="18" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></div>
      </div>
    </header>

    <main class="main">
      <aside class="rail">

    const batchDeleteBtn = document.getElementById("batchDeleteBtn");
    const mentionPanel = document.getElementById("mentionPanel");
    const mentionYuanbao = document.getElementById("mentionYuanbao");

    const defaultFileState = {
      currentFolderId: "root",
      folders: [
        { id: "subject", name: "学科库", parentId: "root", updatedAt: "12:34" }
      ],
      files: [
        { id: "seed-english", name: "英语.docx", size: 10840, folderId: "subject", updatedAt: "12:34" },
        { id: "seed-japanese", name: "日语.docx", size: 10650, folderId: "subject", updatedAt: "12:34" },
        { id: "seed-ai", name: "人工智能.docx", size: 10747, folderId: "subject", updatedAt: "12:34" },

        { id: "seed-training", name: "军训活动.docx", size: 10926, folderId: "subject", updatedAt: "12:34" }
      ]
    };
    const STORAGE_KEY = "qq_group_file_state_v2";
    let fileState = defaultFileState;
    try {
      fileState = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultFileState;
    } catch {
      fileState = defaultFileState;
    }

    function fitWindowToViewport() {
      if (window.innerWidth <= 720) {
        qqWindow.style.setProperty("--app-scale", "1");
        return;
      }
      const scale = Math.min(window.innerWidth / 1173, window.innerHeight / 963);
      qqWindow.style.setProperty("--app-scale", scale.toString());
    }

    fitWindowToViewport();
    window.addEventListener("resize", fitWindowToViewport);

    let uploadTarget = "chat";
    let selectedEntries = new Set();

    function appendMessage(role, text) {
      const row = document.createElement("div");
      row.className = `message-row ${role}`;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      row.appendChild(bubble);
      messageList.appendChild(row);
      messageList.scrollTop = messageList.scrollHeight;
      return bubble;
    }

    function folderById(id) {
      return fileState.folders.find((folder) => folder.id === id);
    }

    function childrenOf(folderId) {
      return {
        folders: fileState.folders.filter((folder) => folder.parentId === folderId),
        files: fileState.files.filter((file) => file.folderId === folderId)
      };
    }

    function formatBytes(bytes) {
      if (!bytes) return "0 KB";
      if (bytes < 1024 * 1024) return `${Math.max(1, Math.round(bytes / 1024))} KB`;
      return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
    }

    function fileExt(name) {
      const ext = name.split(".").pop();
      return ext && ext !== name ? ext.slice(0, 4).toUpperCase() : "FILE";
    }

    function nowTime() {
      return new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", hour12: false });
    }

    function activeMentionStart() {
      const caret = questionInput.selectionStart ?? questionInput.value.length;
      const beforeCaret = questionInput.value.slice(0, caret);
      const atIndex = beforeCaret.lastIndexOf("@");
      if (atIndex < 0) return -1;
      const afterAt = beforeCaret.slice(atIndex + 1);
      if (/[\s\n]/.test(afterAt)) return -1;
      return atIndex;
    }

    function updateMentionPanel() {
      mentionPanel.classList.toggle("open", activeMentionStart() >= 0);
    }

    function closeMentionPanel() {
      mentionPanel.classList.remove("open");
    }

    function insertYuanbaoMention() {
      const start = activeMentionStart();
      if (start < 0) return;
      const caret = questionInput.selectionStart ?? questionInput.value.length;
      const before = questionInput.value.slice(0, start);
      const after = questionInput.value.slice(caret);
      const mention = "@元宝 ";
      questionInput.value = `${before}${mention}${after}`;
      const nextCaret = before.length + mention.length;
      questionInput.setSelectionRange(nextCaret, nextCaret);
      closeMentionPanel();
      questionInput.focus();
    }

    function showActionFeedback(text) {
      appendMessage("ai", text);
    }

    function bindStaticIconFeedback() {
      const navNames = ["消息", "联系人", "收藏", "频道", "装扮", "链接", "文档", "游戏", "应用", "邮箱", "手机", "菜单"];
      document.querySelectorAll(".rail .nav").forEach((item, index) => {
        item.addEventListener("click", () => {
          document.querySelectorAll(".rail .nav").forEach((nav) => nav.classList.remove("active"));
          item.classList.add("active");
          showActionFeedback(`已切换到${navNames[index] || "此"}入口。`);
        });
      });

      document.querySelector(".plus")?.addEventListener("click", () => {
        showActionFeedback("新建入口已打开，可以继续扩展为创建群聊或添加会话。");
      });

      document.querySelector(".search")?.addEventListener("click", () => {
        showActionFeedback("搜索入口已选中。");
      });

      document.querySelector(".session")?.addEventListener("click", () => {
        showActionFeedback("已打开 xx 大学学习库。");
      });

      const actionNames = ["语音通话", "视频通话", "屏幕分享", "", "添加", "更多"];
      document.querySelectorAll(".chat-head .icon-btn").forEach((item, index) => {
        if (item.id === "groupAppsBtn") return;
        item.addEventListener("click", () => {
          showActionFeedback(`${actionNames[index] || "该"}功能已点击。`);
        });
      });

      const toolNames = ["表情", "截图", "图片", "工具箱", "语音", "历史"];
      document.querySelectorAll(".toolbar .tool").forEach((item, index) => {
        if (item.closest("#fileUploadBtn")) return;
        item.addEventListener("click", () => {
          showActionFeedback(`${toolNames[index] || "工具"}功能已点击。`);
        });
      });
    }

    function folderPath(id) {
      const names = [];
      let cursor = id;
      while (cursor && cursor !== "root") {
        const folder = folderById(cursor);
        if (!folder) break;
        names.unshift(folder.name);
        cursor = folder.parentId;
      }
      return names.length ? `文件夹 / ${names.join(" / ")}` : "文件夹";
    }

    function countAllFiles(folderId) {
      const direct = fileState.files.filter((file) => file.folderId === folderId).length;
      const nested = fileState.folders
        .filter((folder) => folder.parentId === folderId)
        .reduce((sum, folder) => sum + countAllFiles(folder.id), 0);
      return direct + nested;
    }

    function totalFileSize() {
      return fileState.files.reduce((sum, file) => sum + (file.size || 0), 0);
    }

    function entryKey(type, id) {
      return `${type}:${id}`;
    }

    function isSelected(type, id) {
      return selectedEntries.has(entryKey(type, id));
    }

    function setSelected(type, id, checked) {
      const key = entryKey(type, id);
      if (checked) selectedEntries.add(key);
      else selectedEntries.delete(key);
      updateSelectionButtons();
    }

    function currentVisibleEntries() {
      const { folders, files } = childrenOf(fileState.currentFolderId);
      return [
        ...folders.map((folder) => ({ type: "folder", id: folder.id })),
        ...files.map((file) => ({ type: "file", id: file.id }))
      ];
    }

    function selectedItems() {
      return [...selectedEntries].map((key) => {
        const [type, id] = key.split(":");
        return { type, id };
      }).filter((item) => {
        return item.type === "folder" ? folderById(item.id) : fileState.files.some((file) => file.id === item.id);
      });
    }

    function updateSelectionButtons() {
      const selectedCount = selectedItems().length;
      const visible = currentVisibleEntries();
      const allVisibleSelected = visible.length > 0 && visible.every((item) => selectedEntries.has(entryKey(item.type, item.id)));
      batchMoveBtn.disabled = selectedCount === 0;
      batchDeleteBtn.disabled = selectedCount === 0;
      selectAllBtn.textContent = allVisibleSelected ? "取消全选" : "全选";
    }

    function selectAllVisible() {
      const visible = currentVisibleEntries();
      const allVisibleSelected = visible.length > 0 && visible.every((item) => selectedEntries.has(entryKey(item.type, item.id)));
      visible.forEach((item) => {
        const key = entryKey(item.type, item.id);
        if (allVisibleSelected) selectedEntries.delete(key);
        else selectedEntries.add(key);
      });
      renderFileManager();
    }

    function folderDescendants(folderId) {
      const direct = fileState.folders.filter((folder) => folder.parentId === folderId);
      return direct.flatMap((folder) => [folder.id, ...folderDescendants(folder.id)]);
    }

    function deleteFolderTree(folderId) {
      const ids = [folderId, ...folderDescendants(folderId)];
      fileState.folders = fileState.folders.filter((folder) => !ids.includes(folder.id));
      fileState.files = fileState.files.filter((file) => !ids.includes(file.folderId));
    }

    function moveTargetsFor(items) {
      const blocked = new Set();
      items.filter((item) => item.type === "folder").forEach((item) => {
        blocked.add(item.id);
        folderDescendants(item.id).forEach((id) => blocked.add(id));
      });
      return [
        { id: "root", name: "根目录" },
        ...fileState.folders
      ].filter((folder) => !blocked.has(folder.id));
    }

    function chooseFolderTarget(items, message) {
      const targets = moveTargetsFor(items);
      if (!targets.length) {
        window.alert("暂无可移动到的文件夹，请先新建文件夹。");
        return null;
      }
      const list = targets.map((folder, index) => {
        const label = folder.id === "root" ? "根目录" : folderPath(folder.id).replace("文件夹 / ", "");
        return `${index + 1}. ${label}`;
      }).join("\n");
      const value = window.prompt(`${message}\n${list}`, "1");
      const index = Number(value) - 1;
      return Number.isInteger(index) && targets[index] ? targets[index].id : null;
    }

    function moveEntries(items) {
      if (!items.length) return;
      const targetId = chooseFolderTarget(items, "移动到哪个文件夹？");
      if (!targetId) return;
      items.forEach((item) => {
        if (item.type === "folder") {
          const folder = folderById(item.id);
          if (folder) {
            folder.parentId = targetId;
            folder.updatedAt = nowTime();
          }
        } else {
          const file = fileState.files.find((entry) => entry.id === item.id);
          if (file) {
            file.folderId = targetId;
            file.updatedAt = nowTime();
          }
        }
      });
      const target = folderById(targetId);
      if (target) target.updatedAt = nowTime();
      selectedEntries.clear();
      renderFileManager();
    }

    function deleteEntries(items) {
      if (!items.length) return;
      const ok = window.confirm(`确定删除选中的 ${items.length} 项吗？`);
      if (!ok) return;
      items.forEach((item) => {
        if (item.type === "folder") deleteFolderTree(item.id);
        else fileState.files = fileState.files.filter((file) => file.id !== item.id);
      });
      selectedEntries.clear();
      renderFileManager();
    }

    function renameFolder(folderId) {
      const folder = folderById(folderId);
      if (!folder) return;
      const name = window.prompt("请输入新的文件夹名称", folder.name);
      if (!name || !name.trim()) return;
      folder.name = name.trim();
      folder.updatedAt = nowTime();
      renderFileManager();
    }

    function renderFileManager() {
      const { folders, files } = childrenOf(fileState.currentFolderId);
      fileList.innerHTML = "";
      folderPathLabel.textContent = folderPath(fileState.currentFolderId);

      if (fileState.currentFolderId !== "root") {
        const parent = folderById(fileState.currentFolderId)?.parentId || "root";
        const up = document.createElement("div");
        up.className = "folder-row";
        up.innerHTML = `
          <div></div>
          <div class="folder-icon" aria-hidden="true"></div>
          <div class="folder-copy">
            <div class="folder-name">返回上一级</div>
            <div class="folder-count">${folderPath(parent)}</div>
          </div>
            <div class="folder-meta"><div></div><div class="updater">点击返回</div></div>
        `;
        up.addEventListener("click", () => {
          fileState.currentFolderId = parent;
          selectedEntries.clear();
          renderFileManager();
        });
        fileList.appendChild(up);
      }

      folders.forEach((folder) => {
        const row = document.createElement("div");
        row.className = "folder-row";
        row.innerHTML = `
          <input class="row-select" type="checkbox" ${isSelected("folder", folder.id) ? "checked" : ""} aria-label="选择文件夹">
          <div class="folder-icon" aria-hidden="true"></div>
          <div class="folder-copy">
            <div class="folder-name"></div>
            <div class="folder-count">${countAllFiles(folder.id)} 个文件</div>
          </div>
          <div class="folder-meta">
            <div>${folder.updatedAt}</div>
            <div class="row-actions">
              <button class="mini-btn rename-btn" type="button">改名</button>
              <button class="mini-btn move-btn" type="button">移动</button>
              <button class="mini-btn danger delete-btn" type="button">删除</button>
            </div>
          </div>
        `;
        row.querySelector(".folder-name").textContent = folder.name;
        row.querySelector(".row-select").addEventListener("click", (event) => {
          event.stopPropagation();
          setSelected("folder", folder.id, event.target.checked);
        });
        row.querySelector(".rename-btn").addEventListener("click", (event) => {
          event.stopPropagation();
          renameFolder(folder.id);
        });
        row.querySelector(".move-btn").addEventListener("click", (event) => {
          event.stopPropagation();
          moveEntries([{ type: "folder", id: folder.id }]);
        });
        row.querySelector(".delete-btn").addEventListener("click", (event) => {
          event.stopPropagation();
          deleteEntries([{ type: "folder", id: folder.id }]);
        });
        row.addEventListener("click", () => {
          fileState.currentFolderId = folder.id;
          selectedEntries.clear();
          renderFileManager();
        });
        fileList.appendChild(row);
      });

      files.forEach((file) => {
        const row = document.createElement("div");
        row.className = "file-row";
        row.innerHTML = `
          <input class="row-select" type="checkbox" ${isSelected("file", file.id) ? "checked" : ""} aria-label="选择文件">
          <div class="file-icon"><span class="file-type">${fileExt(file.name)}</span></div>
          <div class="folder-copy">
            <div class="file-name"></div>
            <div class="file-size">${formatBytes(file.size)}</div>
          </div>
          <div class="file-meta">
            <div>${file.updatedAt}</div>
            <div class="row-actions">
              <button class="mini-btn move-btn" type="button">移动</button>
              <button class="mini-btn danger delete-btn" type="button">删除</button>
            </div>
          </div>
        `;
        row.querySelector(".file-name").textContent = file.name;
        row.querySelector(".row-select").addEventListener("click", (event) => {
          event.stopPropagation();
          setSelected("file", file.id, event.target.checked);
        });
        row.querySelector(".move-btn").addEventListener("click", (event) => {
          event.stopPropagation();
          moveEntries([{ type: "file", id: file.id }]);
        });
        row.querySelector(".delete-btn").addEventListener("click", (event) => {
          event.stopPropagation();
          deleteEntries([{ type: "file", id: file.id }]);
        });
        fileList.appendChild(row);
      });

      if (!folders.length && !files.length && fileState.currentFolderId !== "root") {
        const empty = document.createElement("div");
        empty.className = "empty-tip";
        empty.textContent = "这个文件夹还是空的";
        fileList.appendChild(empty);
      }

      fileTotal.textContent = `共 ${fileState.files.length} 个文件`;
      quotaText.textContent = `${formatBytes(totalFileSize())} / 10 GB`;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(fileState));
      updateSelectionButtons();
    }

    function createFolder() {
      const name = window.prompt("请输入文件夹名称", "新建文件夹");
      if (!name || !name.trim()) return;
      fileState.folders.push({
        id: `folder-${Date.now()}`,
        name: name.trim(),
        parentId: fileState.currentFolderId,
        updatedAt: nowTime()
      });
      renderFileManager();
    }

    async function uploadFile(file) {
      const formData = new FormData();
      formData.append("file", file);
      fileStatus.textContent = `正在上传：${file.name}`;
      const response = await fetch("/upload", { method: "POST", body: formData });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || "上传失败");
      return data;
    }

    async function askQuestion() {
      const question = questionInput.value.trim();
      if (!question) { questionInput.focus(); return; }
      appendMessage("user", question);
      questionInput.value = "";
      const pendingBubble = appendMessage("ai", "正在查找群文件并生成回答...");
      sendBtn.style.pointerEvents = "none";
      sendBtn.style.opacity = "0.75";
      try {
        const response = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "提问失败");
        pendingBubble.textContent = data.answer || "没有返回回答。";
      } catch (error) {
        pendingBubble.textContent = error.message;
      } finally {
        sendBtn.style.pointerEvents = "";
        sendBtn.style.opacity = "";
        questionInput.focus();
      }
    }

    groupAppsBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      appsMenu.classList.toggle("open");
      groupAppsBtn.classList.toggle("active", appsMenu.classList.contains("open"));
    });
    document.addEventListener("click", (event) => {
      if (!appsMenu.contains(event.target) && !groupAppsBtn.contains(event.target)) {
        appsMenu.classList.remove("open");
        groupAppsBtn.classList.remove("active");
      }
    });
    openGroupFiles.addEventListener("click", () => {
      appsMenu.classList.remove("open");
      groupAppsBtn.classList.remove("active");
      qqWindow.classList.add("file-mode");
      renderFileManager();
    });
    backToChat.addEventListener("click", () => qqWindow.classList.remove("file-mode"));
    fileUploadBtn.addEventListener("click", () => {
      uploadTarget = "chat";
      fileInput.click();
    });
    filePageUpload.addEventListener("click", () => {
      uploadTarget = "manager";
      fileInput.click();
    });
    newFolderBtn.addEventListener("click", createFolder);
    selectAllBtn.addEventListener("click", selectAllVisible);
    batchMoveBtn.addEventListener("click", () => moveEntries(selectedItems()));
    batchDeleteBtn.addEventListener("click", () => deleteEntries(selectedItems()));
    mentionYuanbao.addEventListener("mousedown", (event) => {
      event.preventDefault();
      insertYuanbaoMention();
    });
    fileInput.addEventListener("change", async () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;
      try {
        const data = await uploadFile(file);
        const targetFolder = uploadTarget === "manager" ? fileState.currentFolderId : "root";
        fileState.files.push({
          id: `file-${Date.now()}`,
          name: data.filename || file.name,
          size: file.size,
          folderId: targetFolder,
          updatedAt: nowTime()
        });
        const folder = folderById(targetFolder);
        if (folder) folder.updatedAt = nowTime();
        fileStatus.textContent = `已上传：${data.filename}，共 ${data.chunks} 个片段`;
        renderFileManager();
        appendMessage("ai", `群文件已上传并索引：${data.filename}`);
      } catch (error) {
        fileStatus.textContent = error.message;
        appendMessage("ai", error.message);
      } finally {
        fileInput.value = "";
      }
    });
    sendBtn.addEventListener("click", askQuestion);
    questionInput.addEventListener("input", updateMentionPanel);
    questionInput.addEventListener("click", updateMentionPanel);
    questionInput.addEventListener("blur", () => {
      window.setTimeout(closeMentionPanel, 120);
    });
    questionInput.addEventListener("keydown", (event) => {
      if (mentionPanel.classList.contains("open") && (event.key === "Enter" || event.key === "Tab")) {
        event.preventDefault();
        insertYuanbaoMention();
        return;
      }
      if (event.key === "Escape") {
        closeMentionPanel();
        return;
      }
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        askQuestion();
      }
    });
    bindStaticIconFeedback();
    renderFileManager();
  </script>
</body>
</html>
